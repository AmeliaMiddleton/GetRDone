<div class="task-log-list">
  @if (entries.length === 0) {
    <p class="empty-state">No tasks logged for this day.</p>
  }
  @for (entry of entries; track entry.id) {
    <div class="entry-card" [style.border-left-color]="resolveType(entry.taskTypeId).color">
      <div class="entry-header">
        <span class="entry-type" [style.color]="resolveType(entry.taskTypeId).color">
          {{ resolveType(entry.taskTypeId).name }}
        </span>
        <div class="entry-right">
          <span class="entry-duration">{{ formatIncrements(entry.increments) }}</span>
          <button class="icon-btn" (click)="editEntry.emit(entry)" title="Edit" aria-label="Edit">&#9998;</button>
          <button class="icon-btn icon-btn--danger" (click)="deleteEntry.emit(entry.id)" title="Delete" aria-label="Delete">&#x1F5D1;</button>
        </div>
      </div>
      @if (entry.summary) {
        <p class="entry-summary">{{ entry.summary }}</p>
      }
    </div>
  }
</div>
