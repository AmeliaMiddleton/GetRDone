<div class="dialog-container">
  <div class="dialog-header">
    <h2>{{ isEditing ? 'Edit Task' : 'Log Task' }}</h2>
    <button class="close-btn" (click)="cancel()" aria-label="Close">&#x2715;</button>
  </div>

  <p class="dialog-date">{{ formattedDate }}</p>

  <form [formGroup]="form" (ngSubmit)="submit()">
    <div class="form-field">
      <label for="taskTypeId">Task Type</label>
      @if (data.taskTypes.length === 0) {
        <p class="field-warning">No task types yet. Go to Setup to create one.</p>
      } @else {
        <select
          id="taskTypeId"
          formControlName="taskTypeId"
          [class.select-error]="taskTypeInvalid"
        >
          <option value="" disabled>-- Select a task type --</option>
          @for (type of data.taskTypes; track type.id) {
            <option [value]="type.id">{{ type.name }}</option>
          }
        </select>
        @if (taskTypeInvalid) {
          <span class="field-error">Please select a task type.</span>
        }
      }
    </div>

    <div class="form-field">
      <label for="increments">
        Increments: <strong>{{ form.value.increments }} × 25 min = {{ durationLabel }}</strong>
      </label>
      <input
        id="increments"
        type="range"
        formControlName="increments"
        min="1"
        max="8"
        step="1"
      />
      <div class="increment-ticks">
        @for (n of [1,2,3,4,5,6,7,8]; track n) {
          <span>{{ n }}</span>
        }
      </div>
    </div>

    <div class="form-field">
      <label for="summary">Summary (optional)</label>
      <textarea
        id="summary"
        formControlName="summary"
        rows="3"
        placeholder="How did it go?"
      ></textarea>
    </div>

    <div class="dialog-actions">
      <button type="button" class="btn-secondary" (click)="cancel()">Cancel</button>
      <button
        type="submit"
        class="btn-primary"
        [disabled]="data.taskTypes.length === 0"
      >
        {{ isEditing ? 'Update' : 'Save' }}
      </button>
    </div>
  </form>
</div>
